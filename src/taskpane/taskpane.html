<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAI</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <!-- 禁止浏览器缓存 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>

<body>
  <div id="app">
    <!-- 顶部 -->
    <header id="header">
      <div class="header-title">
        <span class="logo">⚡</span>
        <h1>WordAI</h1>
        <span style="flex:1"></span>
        <button class="theme-toggle" id="theme-toggle-btn" title="切换主题">🌓</button>
      </div>
      <nav class="tab-bar">
        <button class="tab-btn active" data-tab="actions" id="tab-actions">操作</button>
        <button class="tab-btn" data-tab="academic" id="tab-academic">学术</button>
        <button class="tab-btn" data-tab="settings" id="tab-settings">设置</button>
      </nav>
    </header>

    <!-- 未配置提示 -->
    <div id="config-banner" class="config-banner hidden">
      <p>⚙️ 请先完成 API 配置</p>
      <button class="btn btn-sm btn-primary" id="go-settings-btn">前往设置</button>
    </div>

    <!-- 操作页 -->
    <div id="page-actions" class="page active">
      <!-- 极速学术快捷操作台 (快捷唤出) -->
      <div id="quick-action-deck" class="quick-action-deck hidden">
        <div class="deck-header">
          <span class="deck-title">⚡ 极速学术快捷操作台</span>
          <button class="deck-close" id="btn-close-deck" title="关闭">×</button>
        </div>
        <div class="deck-body">
          <button class="deck-btn btn-polish" id="btn-deck-polish">
            <span class="btn-icon">✨</span>
            <span class="btn-text">AI 润色</span>
          </button>
          <button class="deck-btn btn-deai" id="btn-deck-deai">
            <span class="btn-icon">🎭</span>
            <span class="btn-text">AI 降AI</span>
          </button>
          <button class="deck-btn btn-cool" id="btn-deck-cool">
            <span class="btn-icon">❄️</span>
            <span class="btn-text">AI 降温</span>
          </button>
        </div>
      </div>

      <section class="section">
        <div id="action-grid" class="action-grid"></div>
        <!-- 内联状态条由 JS 动态插入 -->
      </section>

      <section class="section">
        <div class="custom-prompt-area">
          <textarea id="custom-prompt" placeholder="输入自定义指令... (Ctrl+Enter)" rows="2"></textarea>
          <button class="btn btn-primary btn-block" id="custom-run-btn">
            <span class="btn-icon">▶</span> 执行
          </button>
        </div>
      </section>

      <!-- 新增：批量处理队列与滚动终端控制台 -->
      <section class="section hidden" id="pipeline-console-section" style="margin-top: 10px;">
        <div class="pipeline-console" id="pipeline-console">
          <div class="console-header">
            <span class="console-dot red"></span>
            <span class="console-dot yellow"></span>
            <span class="console-dot green"></span>
            <span class="console-title" id="pipeline-console-title">空闲</span>
            <span style="flex:1"></span>
            <button class="btn btn-xs btn-ghost" id="btn-clear-console" style="font-size:9px; padding:2px 6px; opacity:0.7;">清除</button>
          </div>
          <div class="console-body" id="pipeline-console-body">
            <div class="console-line system">⚡ 流水线已准备就绪。</div>
          </div>
        </div>
      </section>
    </div>

    <!-- 学术页 -->
    <div id="page-academic" class="page">
      <!-- 表格工具 -->
      <section class="section academic-section">
        <h2 class="section-title">📊 表格美化</h2>
        <div class="academic-card">
          <button class="btn btn-primary btn-block btn-sm" id="btn-apply-3line">一键三线表</button>
          <button class="btn btn-ghost btn-block btn-sm" id="btn-scan-tables" style="margin-top:4px">扫描全文表格</button>
          <div id="table-scan-results" class="compact-list hidden"></div>

          <details class="compact-details">
            <summary>微调参数</summary>
            <div class="form-group-compact">
              <label>顶/底线宽 (pt)</label>
              <input type="number" id="input-line-bold" value="1.5" step="0.25" min="0.5" class="form-input-sm">
            </div>
          </details>
        </div>
      </section>

      <!-- 引用工具 -->
      <section class="section academic-section">
        <h2 class="section-title">📚 参考文献</h2>
        <div class="academic-card">
          <button class="btn btn-primary btn-block btn-sm" id="btn-match-refs">匹配占位符 【作者】</button>

          <!-- 参考文献分步导航 -->
          <div id="ref-navigator" class="hidden"
            style="margin-top:8px; padding:8px; background:var(--bg-base); border-radius:var(--radius-sm); border:1px solid var(--border);">
            <div style="font-size:11px; margin-bottom:4px; color:var(--text-secondary);" id="ref-nav-status">正在匹配第 0/0
              处引用</div>
            <div style="display:flex; gap:4px; margin-bottom:6px;">
              <input type="text" id="ref-nav-target" class="form-input" style="flex:1; font-size:11px; padding:4px;"
                readonly>
            </div>
            <div style="display:flex; gap:4px;">
              <button class="btn btn-ghost btn-sm" id="btn-ref-prev" style="padding:2px 8px;">←</button>
              <button class="btn btn-primary btn-sm" id="btn-ref-confirm" style="flex:1; padding:2px 8px;">确认替换</button>
              <button class="btn btn-ghost btn-sm" id="btn-ref-next" style="padding:2px 8px;">→</button>
            </div>
            
            <!-- 新增：文献打分匹配分析诊断抽屉 -->
            <details class="compact-details" style="margin-top:6px; font-size:10px; border-top:1px dashed var(--border); padding-top:6px;" id="ref-match-details-container">
              <summary style="cursor:pointer; color:var(--text-secondary); outline:none;">🔍 匹配打分调试详情</summary>
              <div id="ref-match-details-content" style="padding-top:4px; max-height:110px; overflow-y:auto; color:var(--text-secondary); line-height:1.4;">
                <!-- 动态诊断数据 -->
              </div>
            </details>
          </div>

          <button class="btn btn-ghost btn-block btn-sm" id="btn-refresh-refs" style="margin-top:4px">一键刷新编号与链接</button>
        </div>
      </section>

      <!-- 写作辅助 -->
      <section class="section academic-section">
        <h2 class="section-title">✍️ 写作辅助</h2>
        <div class="academic-card">
          <button class="btn btn-ghost btn-block btn-sm" id="btn-term-check">术语一致性检查</button>
          <div id="term-check-results" class="compact-list hidden"
            style="margin-top:4px; max-height:150px; overflow-y:auto;"></div>
          <button class="btn btn-ghost btn-block btn-sm" id="btn-renumber" style="margin-top:4px">图表编号同步</button>
          <button class="btn btn-ghost btn-block btn-sm" id="btn-gen-abstract" style="margin-top:4px">生成摘要与关键词</button>
        </div>
      </section>
    </div>

    <!-- 设置页 -->
    <div id="page-settings" class="page">
      <section class="section">
        <h2 class="section-title">API 配置</h2>
        <div class="form-group">
          <label class="form-label" for="api-endpoint">API 端点</label>
          <input type="url" id="api-endpoint" class="form-input" placeholder="https://api.openai.com" />
          <span class="form-hint">OpenAI 兼容格式（不含 /v1）</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="api-key">API Key</label>
          <div class="input-with-action">
            <input type="password" id="api-key" class="form-input" placeholder="sk-..." />
            <button class="btn btn-sm btn-ghost" id="toggle-key-btn">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="model-select">模型</label>
          <div class="input-with-action">
            <select id="model-select" class="form-input">
              <option value="">-- 获取模型列表 --</option>
            </select>
            <button class="btn btn-sm btn-primary" id="fetch-models-btn">🔄</button>
          </div>
          <div id="model-status" class="form-hint"></div>
        </div>
        <div class="form-group">
          <label class="form-label">
            温度 <span id="temperature-value" class="badge">0.7</span>
          </label>
          <input type="range" id="temperature-slider" class="form-range" min="0" max="2" step="0.1" value="0.7" />
          <div class="range-labels"><span>精确</span><span>创意</span></div>
        </div>
        <button class="btn btn-primary btn-block" id="test-connection-btn">
          <span class="btn-icon">🔗</span> 测试连接
        </button>
        <div id="connection-result" class="connection-result hidden"></div>
      </section>

      <section class="section">
        <h2 class="section-title">跳过规则</h2>
        <p class="section-desc">处理时自动跳过</p>
        <div class="skip-rules">
          <label class="toggle-item"><input type="checkbox" id="skip-headings" checked /><span
              class="toggle-slider"></span><span class="toggle-label">标题</span></label>
          <label class="toggle-item"><input type="checkbox" id="skip-tables" checked /><span
              class="toggle-slider"></span><span class="toggle-label">表格</span></label>
          <label class="toggle-item"><input type="checkbox" id="skip-formulas" checked /><span
              class="toggle-slider"></span><span class="toggle-label">公式</span></label>
          <label class="toggle-item"><input type="checkbox" id="skip-crossrefs" checked /><span
              class="toggle-slider"></span><span class="toggle-label">交叉引用</span></label>
          <label class="toggle-item"><input type="checkbox" id="skip-images" checked /><span
              class="toggle-slider"></span><span class="toggle-label">图片</span></label>
          <label class="toggle-item"><input type="checkbox" id="skip-toc" checked /><span
              class="toggle-slider"></span><span class="toggle-label">目录</span></label>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">显示对比</h2>
        <p class="section-desc">在文档中标记 AI 修改过的地方</p>
        <div class="skip-rules">
          <label class="toggle-item">
            <input type="checkbox" id="diff-mode-toggle" />
            <span class="toggle-slider"></span>
            <span class="toggle-label">开启修订模式</span>
          </label>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">
          提示词模板
          <button class="btn btn-sm btn-ghost" id="add-prompt-btn">＋</button>
        </h2>
        <div id="prompt-list" class="prompt-list"></div>
        <button class="btn btn-ghost btn-block btn-sm" id="reset-prompts-btn">↻ 恢复默认</button>
      </section>

      <footer class="settings-footer">
        <p>WordAI v1.0.6</p>
      </footer>
    </div>
  </div>

  <!-- 弹窗 -->
  <div id="prompt-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h3 id="modal-title">编辑提示词</h3>
      <div class="form-group">
        <label class="form-label">名称</label>
        <input type="text" id="prompt-name" class="form-input" placeholder="如：润色" />
      </div>
      <div class="form-group">
        <label class="form-label">图标</label>
        <input type="text" id="prompt-icon" class="form-input" placeholder="✨" maxlength="4" />
      </div>
      <div class="form-group">
        <label class="form-label">颜色</label>
        <input type="color" id="prompt-color" class="form-input-color" value="#6366f1" />
      </div>
      <div class="form-group">
        <label class="form-label">提示词</label>
        <textarea id="prompt-text" class="form-input" rows="4" placeholder="输入内容..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="save-prompt-btn">保存</button>
        <button class="btn btn-ghost" id="cancel-prompt-btn">取消</button>
      </div>
    </div>
  </div>
</body>

</html>
